<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayesian Detector Tomography (BDT) Reconstruction</title>
    
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    
    <script src="bdt.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; color: #333; background-color: #f4f7f6; }
        h1 { border-bottom: 2px solid #0056b3; padding-bottom: 10px; color: #0056b3; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        
        /* Control Panel Styles */
        .sidebar { flex: 1; min-width: 320px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="number"], input[type="file"], input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Button Styles */
        button { background: #0056b3; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; width: 100%; margin-bottom: 10px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #004494; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #btn-stop { background: #dc3545; display: none; }
        #btn-stop:hover { background: #c82333; }
        
        /* Main Content & Plot Styles */
        .main-content { flex: 2; min-width: 700px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 20px; }
        /*.plot-container { flex-grow: 1; min-height: 400px; border: 1px solid #eee; border-radius: 4px; background: #fafafa; }*/
        .plot-container {
            width: 100%;
            max-width: 900px; /* Maximum width allowed */
            height: auto;
            min-height: 400px;
            margin: 0 auto;
            background: #fafafa;
            display: flex;
            justify-content: center; /* Center the plot if it's narrow */
        }
        
        /* Log Output */
        .log-area { width: 100%; height: 120px; background: #1e1e1e; color: #00ff00; border: none; border-radius: 4px; padding: 10px; overflow-y: scroll; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: vertical; }
    </style>
</head>
<body>

    <h1>BDT POVM Reconstruction Interface</h1>

    <div class="container">
        <div class="sidebar">
            <h3>1. Upload Data</h3>
            <div class="form-group">
                <label for="data-file">Experimental Data File (TXT/CSV)</label>
                <input type="file" id="data-file" accept=".txt,.csv,.dat">
            </div>

            <h3>2. Model Parameters</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="max-n">Max Photons (N)</label>
                    <input type="number" id="max-n" value="20" min="1">
                </div>
                <div class="form-group">
                    <label for="max-c">Max Clicks (C)</label>
                    <input type="number" id="max-c" value="8" min="1">
                </div>
            </div>
            <div class="form-group">
                <label for="num-alphas">Number of Alphas</label>
                <input type="number" id="num-alphas" value="10" min="1">
            </div>

            <h3>3. MCMC Settings</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="total-iter">Total Iterations</label>
                    <input type="number" id="total-iter" value="10000" min="1000">
                </div>
                <div class="form-group">
                    <label for="step-size">Steps per Frame</label>
                    <input type="number" id="step-size" value="100" min="1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="sigma">Proposal Sigma</label>
                    <input type="number" id="sigma" value="0.01" step="0.001">
                </div>
                <div class="form-group">
                    <label for="seed">RNG Seed</label>
                    <input type="number" id="seed" value="1234">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

            <button id="btn-start" disabled>Waiting for WASM...</button>
            <button id="btn-stop">Stop / Cancel</button>
        </div>

        <div class="main-content">
            <div id="data-plot-div" class="plot-container"></div>
            
            <div id="plotly-div" class="plot-container"></div>
            
            <textarea id="log-output" class="log-area" readonly></textarea>
        </div>
    </div>

    <script>
        let isRunning = false;
        let currentIter = 0;
        let animationFrameId;
        
        let alphasPtr, countsPtr, povmPtr; 
        
        let parsedAlphas = null;
        let parsedCounts = null;

        const logBox = document.getElementById('log-output');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');

        function logMsg(msg) {
            logBox.value += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        var Module = Module || {};
        Module.onRuntimeInitialized = function() {
            logMsg("WASM Module loaded successfully.");
            btnStart.textContent = "Start Reconstruction";
            btnStart.disabled = false;
        };

        // --- Plot Experimental Data with Error Bars ---
        function plotExperimentalData(alphas, counts, numA, maxC) {
            let traces = [];
            
            // Create one trace for each possible detector click outcome (c)
            for (let c = 0; c <= maxC; c++) {
                let xData = [];
                let yData = [];
                let errorData = [];

                for (let i = 0; i < numA; i++) {
                    xData.push(alphas[i]);
                    
                    // Extract the count value based on flattened array logic: i * (maxC + 1) + c
                    let val = counts[i * (maxC + 1) + c];
                    yData.push(val);
                    
                    // Poisson error = sqrt(N)
                    errorData.push(Math.sqrt(val));
                }

                traces.push({
                    x: xData,
                    y: yData,
                    error_y: {
                        type: 'data',
                        array: errorData,
                        visible: true
                    },
                    mode: 'lines+markers',
                    name: `Clicks = ${c}`
                });
            }

            let layout = {
                title: 'Experimental Data: Counts vs Alpha',
                xaxis: { title: 'Alpha (α)' },
                yaxis: { title: 'Counts' },
                margin: { l: 60, r: 50, b: 50, t: 50 },
                autosize: true
            };

            Plotly.newPlot('data-plot-div', traces, layout);
        }

        // --- Data File Parsing ---
        document.getElementById('data-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
        
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                // Split by whitespace (space, tab, newline) and filter out empty strings
                const tokens = text.trim().split(/\s+/).map(Number);
        
                if (tokens.length < 2) {
                    logMsg("Error: File is too short or invalid format.");
                    return;
                }
        
                let idx = 0;
                // 1. Read maxC and numA
                const fileMaxC = tokens[idx++];
                const fileNumA = tokens[idx++];
        
                // Update UI fields so the user sees what was loaded
                document.getElementById('max-c').value = fileMaxC;
                document.getElementById('num-alphas').value = fileNumA;
        
                logMsg(`Loading data: maxC=${fileMaxC}, numA=${fileNumA}`);
        
                // 2. Read all Alphas (stored as alpha^2 in file, we take sqrt for the algorithm)
                parsedAlphas = new Float64Array(fileNumA);
                for (let i = 0; i < fileNumA; i++) {
                    let alphaSq = tokens[idx++];
                    parsedAlphas[i] = Math.sqrt(alphaSq); 
                }
        
                // 3. Read Counts for each Alpha
                // Expected structure: Alpha0_Counts[0...maxC], Alpha1_Counts[0...maxC]...
                const totalCountElements = fileNumA * (fileMaxC + 1);
                parsedCounts = new Float64Array(totalCountElements);
                
                for (let i = 0; i < totalCountElements; i++) {
                    if (idx < tokens.length) {
                        parsedCounts[i] = tokens[idx++];
                    } else {
                        logMsg("Warning: Reached end of file before filling counts matrix.");
                        break;
                    }
                }
        
                logMsg(`Successfully parsed ${fileNumA} alphas and ${totalCountElements} data points.`);
                
                // Update the plot immediately
                plotExperimentalData(parsedAlphas, parsedCounts, fileNumA, fileMaxC);
            };
            reader.readAsText(file);
        });

        // --- Plotly Heatmap Initialization ---
        function initPlotly(maxN, maxC) {
            const container = document.getElementById('plotly-div');
            const maxWidth = container.clientWidth;
            const maxHeight = 600; // Define a reasonable maximum height
        
            // The ratio of our data grid
            const dataRatio = (maxN + 1) / (maxC + 1);
        
            let plotWidth, plotHeight;
        
            // Logic: Fit the plot into the container while maintaining dataRatio
            if (maxWidth / maxHeight > dataRatio) {
                // Height is the limiting factor
                plotHeight = maxHeight;
                plotWidth = maxHeight * dataRatio;
            } else {
                // Width is the limiting factor
                plotWidth = maxWidth;
                plotHeight = maxWidth / dataRatio;
            }
        
            // Ensure we don't get tiny plots for small N or C
            plotWidth = Math.max(plotWidth, 300);
            plotHeight = Math.max(plotHeight, 300);
        
            let data = [{
                z: Array.from({length: maxC + 1}, () => new Array(maxN + 1).fill(0)),
                x: Array.from({length: maxN + 1}, (_, i) => i),
                y: Array.from({length: maxC + 1}, (_, i) => i),
                type: 'heatmap',
                colorscale: 'Viridis',
                zmin: 0, zmax: 1
            }];
        
            let layout = {
                title: 'Reconstructed POVM Heatmap',
                width: plotWidth,
                height: plotHeight,
                autosize: false,
                xaxis: { title: 'Photons (n)', scaleanchor: "y", scaleratio: 1 }, // Forces square cells
                yaxis: { title: 'Clicks (c)' },
                margin: { l: 50, r: 50, b: 50, t: 50 }
            };
    
            Plotly.newPlot('plotly-div', data, layout);
        }


        // --- Main Execution Loop ---
        btnStart.addEventListener('click', () => {
            if (!parsedAlphas || !parsedCounts) {
                alert("Please upload a data file first.");
                return;
            }

            const maxN = parseInt(document.getElementById('max-n').value);
            const maxC = parseInt(document.getElementById('max-c').value);
            const numA = parseInt(document.getElementById('num-alphas').value);
            const totalIter = parseInt(document.getElementById('total-iter').value);
            const stepSize = parseInt(document.getElementById('step-size').value);
            const sigma = parseFloat(document.getElementById('sigma').value);
            const seed = parseInt(document.getElementById('seed').value);

            const numParams = (maxN + 1) * (maxC + 1);

            let initialPovm = new Float64Array(numParams);
            for(let n=0; n<=maxN; n++){
                for(let c=0; c<=maxC; c++){
                    initialPovm[n*(maxC+1) + c] = 1.0 / (maxC + 1);
                }
            }

            logMsg("Allocating heap memory...");
            alphasPtr = Module._malloc(parsedAlphas.length * parsedAlphas.BYTES_PER_ELEMENT);
            countsPtr = Module._malloc(parsedCounts.length * parsedCounts.BYTES_PER_ELEMENT);
            povmPtr = Module._malloc(initialPovm.length * initialPovm.BYTES_PER_ELEMENT);

            Module.HEAPF64.set(parsedAlphas, alphasPtr / 8);
            Module.HEAPF64.set(parsedCounts, countsPtr / 8);
            Module.HEAPF64.set(initialPovm, povmPtr / 8);

            logMsg(`Calling bdt_init... Parameters: N=${maxN}, C=${maxC}, Alphas=${numA}`);
            Module.ccall(
                'bdt_init', 'number',
                ['number', 'number', 'number', 'number', 'number', 'number', 'number', 'number'],
                [maxN, maxC, numA, alphasPtr, countsPtr, povmPtr, sigma, seed]
            );
            
            initPlotly(maxN, maxC);

            isRunning = true;
            currentIter = 0;
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            
            logMsg("Starting MCMC Chain...");
            runMCMC(totalIter, stepSize, maxN, maxC, numParams);
        });

        function runMCMC(totalIter, stepSize, maxN, maxC, numParams) {
            if (!isRunning) return;

            if (currentIter < totalIter) {
                let stepsThisFrame = Math.min(stepSize, totalIter - currentIter);
                
                Module.ccall(
                    'bdt_step', 'number',
                    ['number', 'number'],
                    [stepsThisFrame, povmPtr]
                );

                currentIter += stepsThisFrame;

                let currentPovmArray = new Float64Array(Module.HEAPF64.buffer, povmPtr, numParams);

                updatePlotly(currentPovmArray, maxN, maxC);

                if (currentIter % Math.max(1, Math.floor(totalIter / 10)) === 0) {
                    logMsg(`Progress: ${currentIter} / ${totalIter} iterations...`);
                }

                animationFrameId = requestAnimationFrame(() => {
                    runMCMC(totalIter, stepSize, maxN, maxC, numParams);
                });

            } else {
                finishMCMC();
            }
        }

        function finishMCMC() {
            logMsg(`MCMC Complete! 100% finished.`);
            cleanup();
        }

        btnStop.addEventListener('click', () => {
            logMsg("User aborted MCMC run.");
            cancelAnimationFrame(animationFrameId);
            cleanup();
        });

        function cleanup() {
            isRunning = false;
            
            Module.ccall('bdt_cleanup', 'void', [], []);
            
            if (alphasPtr) Module._free(alphasPtr);
            if (countsPtr) Module._free(countsPtr);
            if (povmPtr) Module._free(povmPtr);

            alphasPtr = countsPtr = povmPtr = null;

            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            btnStart.textContent = "Restart Reconstruction";
        }
    </script>
</body>
</html>
